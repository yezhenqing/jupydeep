<svg width="200" height="200" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* 定义整体旋转动画 */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .rotating-group {
        transform-origin: 12px 12px;
        animation: spin 6s infinite linear;
      }

      .text-style {
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 5px;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <g class="rotating-group">
    <circle cx="12" cy="12" r="11" fill="none" stroke="#000" stroke-width="0.8"/>
    
    <path fill="#000" d="M12,1 A11,11 0 0,0 12,23 A5.5,5.5 0 0,0 12,12 A5.5,5.5 0 0,1 12,1 Z" />
    
    <circle cx="12" cy="6.5" r="3" fill="#fff" stroke="#000" stroke-width="0.5"/>
    <text x="12" y="6.5" class="text-style" fill="#000">A</text>
    
    <circle cx="12" cy="17.5" r="3" fill="#000" stroke="#fff" stroke-width="0.5"/>
    <text x="12" y="17.5" class="text-style" fill="#fff">I</text>
  </g>
</svg>
